name: Log Push Activity to Google Sheets

# ─────────────────────────────────────────────────────────────────
# GitHub Secret yang wajib diset:
#   SHEETS_WEBHOOK_URL   → URL Web App dari Google Apps Script
#   SHEETS_WEBHOOK_TOKEN → Token rahasia (harus sama dengan SECRET_TOKEN di Apps Script)
#
# Apps Script target:
#   Sheet ID : 1BREjEjltFFKl7epbLCALALy6nuBWnkaPLOsAe6duLKI
#   Sheet Tab: Activity Log
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches: ['**']

jobs:
  log-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Send commit data to Google Sheets
        env:
          WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.SHEETS_WEBHOOK_TOKEN }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
        run: |
          # Validasi secrets
          if [ -z "$WEBHOOK_URL" ] || [ -z "$WEBHOOK_TOKEN" ]; then
            echo "::error::Missing SHEETS_WEBHOOK_URL or SHEETS_WEBHOOK_TOKEN secret"
            exit 1
          fi

          # Bersihkan commits JSON — handle jika null/empty
          RAW_COMMITS=$(echo "$COMMITS_JSON" | jq 'if type == "array" then . else [] end')
          COMMITS=$(echo "$RAW_COMMITS" | jq '[.[] | {message: (.message // "(no message)")}]')

          # Jika commits kosong (misal merge push), buat satu entry default
          COMMIT_COUNT=$(echo "$COMMITS" | jq 'length')
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            COMMITS='[{"message":"(push without commits)"}]'
          fi

          # Build payload sesuai field yang dibaca Apps Script
          PAYLOAD=$(jq -n \
            --arg token "$WEBHOOK_TOKEN" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg repo "$REPO" \
            --arg author "$ACTOR" \
            --argjson commits "$COMMITS" \
            '{
              token: $token,
              timestamp: $timestamp,
              repo: $repo,
              author: $author,
              commits: $commits
            }')

          echo "Sending payload to Google Sheets..."
          echo "Repo   : $REPO"
          echo "Author : $ACTOR"
          echo "Commits: $COMMIT_COUNT commit(s)"
          echo "URL length : ${#WEBHOOK_URL} chars"
          echo "URL domain : $(echo "$WEBHOOK_URL" | cut -d'/' -f1-3)"

          # Test GET dulu untuk cek apakah URL accessible
          echo "=== Testing URL accessibility (GET) ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L "$WEBHOOK_URL")
          echo "GET HTTP code: $HTTP_CODE"

          # Kirim POST — gunakan --post302 agar method POST tetap saat redirect
          RESPONSE=$(curl -s -L --post302 \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$PAYLOAD")
          HTTP_POST=$(echo "$RESPONSE" | grep -o "===HTTP_CODE:[0-9]*===" | grep -o "[0-9]*" || echo "unknown")
          echo "POST HTTP code: $HTTP_POST"

          echo "Response: $RESPONSE"

          # Validasi response { ok: true }
          if ! echo "$RESPONSE" | jq -e '.ok == true' > /dev/null 2>&1; then
            echo "::error::Failed to log activity. Response: $RESPONSE"
            exit 1
          fi

          LOGGED=$(echo "$RESPONSE" | jq -r '.logged // "?"')
          echo "✅ Successfully logged $LOGGED commit(s) to Google Sheets"
